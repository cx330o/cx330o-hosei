{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-6">
    <div class="bg-white dark:bg-zinc-800/80 rounded-2xl p-8 shadow-lg border border-gray-100 dark:border-zinc-700/50">
        <div class="flex justify-center mb-5">
            <div class="w-16 h-16 rounded-2xl flex items-center justify-center text-3xl shadow-lg
                {% if role == 'teacher' %}bg-gradient-to-br from-emerald-400 to-emerald-600 shadow-emerald-500/30
                {% else %}bg-gradient-to-br from-orange-400 to-orange-600 shadow-orange-500/30{% endif %}">
                {% if role == 'teacher' %}👨‍🏫{% else %}🎓{% endif %}
            </div>
        </div>
        <h1 class="text-2xl font-extrabold text-center mb-6">
            {% if role == 'teacher' %}{{ t('teacher_signup') }}{% else %}{{ t('student_signup') }}{% endif %}
        </h1>
        <form action="{{ url_for('signup', role=role) }}" method="post" class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1.5">{{ t('username') }}</label>
                <input type="text" name="username" placeholder="{{ t('username') }}" required
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-zinc-600 bg-gray-50 dark:bg-zinc-700/50 focus:ring-2 focus:ring-orange-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1.5">{{ t('email') }}</label>
                <input type="email" name="email" placeholder="{{ t('email') }}" required
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-zinc-600 bg-gray-50 dark:bg-zinc-700/50 focus:ring-2 focus:ring-orange-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1.5">{{ t('password') }}</label>
                <input type="password" name="password" placeholder="{{ t('password') }}" required
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-zinc-600 bg-gray-50 dark:bg-zinc-700/50 focus:ring-2 focus:ring-orange-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-500 mb-1.5">{{ t('department') }}</label>
                <input type="text" name="department" placeholder="{{ t('department') }}"
                       class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-zinc-600 bg-gray-50 dark:bg-zinc-700/50 focus:ring-2 focus:ring-orange-500 outline-none transition-all">
            </div>
            <button type="submit"
                    class="w-full text-white py-3 rounded-xl font-bold transition-all shadow-lg hover:opacity-90 hover:-translate-y-0.5
                    {% if role == 'teacher' %}bg-gradient-to-r from-emerald-500 to-emerald-600 shadow-emerald-500/30
                    {% else %}bg-gradient-to-r from-orange-500 to-orange-600 shadow-orange-500/30{% endif %}">
                {{ t('signup') }}
            </button>
        </form>
        <p class="text-center text-sm text-gray-400 mt-6">
            {{ t('has_account') }}
            <a href="{{ url_for('login_role', role=role) }}" class="hosei-orange hover:underline font-medium">{{ t('here') }}</a>
        </p>
        <div class="text-center mt-4">
            <a href="{{ url_for('login') }}" class="text-sm text-gray-400 hover:text-gray-600 transition-colors">← {{ t('back') }}</a>
        </div>
    </div>
</div>
{% endblock %}
