{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">{{ t('create_post') }}</h1>
    <div class="bg-white dark:bg-zinc-800/80 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-zinc-700/50">
        <form action="{{ url_for('create') }}" method="post" class="space-y-4">
            <input type="text" name="title" placeholder="{{ t('title') }}" required
                   class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-zinc-600 bg-gray-50 dark:bg-zinc-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all">
            <textarea name="content" placeholder="{{ t('content') }}" required rows="6"
                      class="w-full px-4 py-3 rounded-xl border border-gray-200 dark:border-zinc-600 bg-gray-50 dark:bg-zinc-700 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all resize-y"></textarea>
            <button type="submit"
                    class="bg-blue-600 text-white px-6 py-3 rounded-xl font-medium hover:bg-blue-700 transition-colors shadow-md shadow-blue-600/20">
                {{ t('post_btn') }}
            </button>
        </form>
    </div>
</div>
{% endblock %}
